name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Unzip Project Files
        run: unzip Project.zip

      - name: Create Writable Cache Directory
        run: mkdir -p ./gradle_cache

      - name: Generate Missing Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2 -g ./gradle_cache

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon -g ./gradle_cache

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: app/build/outputs/apk/debug/app-debug.apk
