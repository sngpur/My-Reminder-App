name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Extract and Organize Project Files
        run: |
          unzip Project.zip
          # If files extracted into a subfolder, move them to the root directory
          if [ -d */app ]; then
            mv */* . 2>/dev/null || true
            mv */.* . 2>/dev/null || true
          fi
          # Ensure a completely fresh gradle wrapper is generated in the right spot
          gradle wrapper --gradle-version 8.2
          chmod -R 777 .

      - name: Build APK without Cache Conflict
        run: |
          ./gradlew assembleDebug --no-daemon --no-build-cache --no-configuration-cache

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: my-app-apk
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            **/build/outputs/apk/debug/*.apk
